name: release

# Builds, signs, notarizes, and publishes the macOS app whenever a vX.Y.Z tag is
# pushed. The `release` agent (prompts/PROMPT_RELEASE.md) bumps the version and
# pushes an annotated tag; everything below is automatic.
#
# Required repository secrets (see RELEASING.md for how to produce each):
#   BUILD_CERTIFICATE_BASE64  base64 of the Developer ID Application .p12
#   P12_PASSWORD              password protecting that .p12
#   KEYCHAIN_PASSWORD         any random string (temp keychain on the runner)
#   SIGNING_IDENTITY          e.g. "Developer ID Application: George Nijo (TEAMID)"
#   AC_API_KEY_ID             App Store Connect API key ID
#   AC_API_ISSUER_ID          App Store Connect API issuer ID
#   AC_API_KEY_P8_BASE64      base64 of the AuthKey_XXXX.p8 file

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub release and upload assets

jobs:
  build:
    runs-on: macos-15   # Xcode 16 / Swift 6 — required by Package.swift (tools 6.0)
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Build & sign app
        env:
          SIGN_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: ./scripts/bundle.sh release

      - name: Package DMG
        id: dmg
        env:
          SIGN_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: echo "name=$(./scripts/make-dmg.sh '${{ steps.ver.outputs.version }}')" >> "$GITHUB_OUTPUT"

      - name: Notarize & staple
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          KEY="$RUNNER_TEMP/AuthKey.p8"
          echo "$AC_API_KEY_P8_BASE64" | base64 --decode > "$KEY"
          xcrun notarytool submit "${{ steps.dmg.outputs.name }}" \
            --key "$KEY" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" --wait
          xcrun stapler staple "${{ steps.dmg.outputs.name }}"
          xcrun stapler validate "${{ steps.dmg.outputs.name }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-from-tag \
            "${{ steps.dmg.outputs.name }}"

      # --- optional: ship the Go CLI alongside the app -----------------------
      # The cli/ tool (and the `fleetdump` JSON dumper) make fleetmap scriptable
      # for agents. Uncomment to attach a CLI tarball to the same release.
      #
      # - name: Build & attach Go CLI
      #   working-directory: cli
      #   env:
      #     GH_TOKEN: ${{ github.token }}
      #   run: |
      #     go build -o fleetmap .
      #     tar -czf "fleetmap-cli-darwin-arm64.tar.gz" fleetmap
      #     gh release upload "$GITHUB_REF_NAME" "fleetmap-cli-darwin-arm64.tar.gz" \
      #       --repo "$GITHUB_REPOSITORY"
